version: 2 

models:
  - name: fct_trips
    description: Trip-level fact table for citi bike rides.
    columns:
      - name: ride_id
        tests:
          - not_null
          - unique 

      - name: trip_date
        tests:
          - not_null 

  - name: fct_trip_daily
    description: Daily aggregated trip fact table for Citi Bike rides.
    columns:
      - name: trip_date
        description: Calender date of the aggregated trip metrics
        tests:
          - not_null
          - unique 

      - name: total_trips 
        descriptione: Total number of trips on that date.
        tests:
          - not_null 

      - name: member_trips
        description: Number of member trips on that date.
        tests:
          - not_null 

      - name: casual_trips 
        description: Number of casual trips on that date.
        tests: 
          - not_null 

      - name: avg_trip_duration_minutes 
        description: Average trip duration in minutes on that date.
        tests:
         - not_null 

  - name: fct_trip_daily_enriched 
    description: Daily trip metrics enriched with weather, holiday and calender context.
    columns:
      - name: trip_date
        description: Calendar date for the daily aggregated metrics.
        tests:
          - not_null
          - unique

      - name: total_trips
        description: Total number of trips on that date.

      - name: member_trips
        description: Number of member trips on that date.

      - name: casual_trips
        description: Number of casual trips on that date.

      - name: avg_trip_duration_minutes
        description: Average trip duration in minutes for that date.

      - name: is_holiday
        description: Flag indicating whether the date is a holiday.

      - name: holiday_name
        description: Name of the holiday, if applicable.

      - name: month_name
        description: Full month name derived from trip_date.

      - name: day_name
        description: Day of week derived from trip_date.

      - name: is_weekend
        description: Flag indicating whether the date falls on a weekend.

      - name: season
        description: Season derived from the trip month.

  - name: fct_station_daily 
    description: Daily station-level Citi Bike trip counts for geospatial dashboard views.
    columns: 
      - name: trip_date
        tests: 
          - not_null
      - name: station_id
        tests: 
          - not_null
      - name: lat 
        tests:
          - not_null
      - name: lon
        tests:
          - not_null
      - name: trip_count
        tests:
          - not_null

  -  name: fct_station_flows_daily
     description: Daily origin-destination Citi Bike trip flows between stations.
     columns:
      - name: trip_date
        tests:
          - not_null

      - name: start_station_id
        tests:
          - not_null

      - name: end_station_id
        tests:
          - not_null

      - name: trip_count
        tests:
          - not_null
  - name: fct_station_hourly
    description: Hourly station-level Citi Bike trip counts for time-of-day map analysis.
    columns:
      - name: trip_date
        description: Calendar date for the hourly station aggregation.
        tests:
          - not_null

      - name: trip_hour
        description: Hour of day when the trip started.
        tests:
          - not_null

      - name: hour_bucket
        description: Time-of-day bucket for the trip hour.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Morning commute"
                  - "Midday"
                  - "Evening commute"
                  - "Night / Early morning"

      - name: is_rush_hour
        description: Flag for morning or evening commute hours.
        tests:
          - not_null

      - name: station_id
        description: Start station identifier.
        tests:
          - not_null

      - name: station_name
        description: Start station name.
        tests:
          - not_null

      - name: lat
        description: Station latitude.
        tests:
          - not_null

      - name: lon
        description: Station longitude.
        tests:
          - not_null

      - name: trip_count
        description: Total trips that started at the station in that hour.
        tests:
          - not_null

      - name: member_trips
        description: Member trips that started at the station in that hour.
        tests:
          - not_null

      - name: casual_trips
        description: Casual trips that started at the station in that hour.
        tests:
          - not_null

  - name: fct_station_flows_hourly
    description: Hourly origin-destination Citi Bike flows for movement map analysis.
    columns:
      - name: trip_date
        description: Calendar date for the hourly flow aggregation.
        tests:
          - not_null

      - name: trip_hour
        description: Hour of day when the trip started.
        tests:
          - not_null

      - name: hour_bucket
        description: Time-of-day bucket for the trip hour.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - "Morning commute"
                  - "Midday"
                  - "Evening commute"
                  - "Night / Early morning"

      - name: is_rush_hour
        description: Flag for morning or evening commute hours.
        tests:
          - not_null

      - name: start_station_id
        description: Origin station identifier.
        tests:
          - not_null

      - name: start_station_name
        description: Origin station name.
        tests:
          - not_null

      - name: end_station_id
        description: Destination station identifier.
        tests:
          - not_null

      - name: end_station_name
        description: Destination station name.
        tests:
          - not_null

      - name: start_lat
        description: Origin station latitude.
        tests:
          - not_null

      - name: start_lng
        description: Origin station longitude.
        tests:
          - not_null

      - name: end_lat
        description: Destination station latitude.
        tests:
          - not_null

      - name: end_lng
        description: Destination station longitude.
        tests:
          - not_null

      - name: trip_count
        description: Total trips for the origin-destination pair in that hour.
        tests:
          - not_null

      - name: member_trips
        description: Member trips for the origin-destination pair in that hour.
        tests:
          - not_null

      - name: casual_trips
        description: Casual trips for the origin-destination pair in that hour.
        tests:
          - not_null


  